<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thema's — Latijn 6de jaar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Flanders Art Sans';
    src: url('../fonts/flanders-art-sans/FlandersArtSans-Bold.woff2') format('woff2'),
         url('../fonts/flanders-art-sans/FlandersArtSans-Bold.woff') format('woff');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --jaar-kleur: #65b32e;
    --hover-kleur: #ffea3d;
    --accent: #FF3B1D;
    --achtergrond: #e0efd5;
    --wit: #f3f1ef;
    --zwart: #010100;
    --tekst-zacht: #6b7280;
    --rand: #c8d4c0;
    --radius: 12px;

    --ft: 'Flanders Art Sans', Arial, sans-serif;
    --fb: 'Noto Sans', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--fb);
    background: var(--achtergrond);
    color: var(--zwart);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ══════════════════════════════════ HERO ══════════════════════════════════ */
  .hero { width: 100%; position: relative; flex-shrink: 0; background: transparent; }
  .hero-inhoud {
    position: relative;
    z-index: 1;
    padding: 3.5rem 2rem 3rem;
    text-align: center;
  }
  .hero h1 {
    font-family: var(--ft);
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 5px;
  }
  .hero h1 .themas { color: var(--jaar-kleur); }
  .hero h1 .jaar { color: rgba(101, 179, 46, 0.6); }
  .hero .ondertitel {
    font-size: 13px;
    color: var(--tekst-zacht);
    font-family: var(--fb);
    letter-spacing: 0.3px;
  }
  .school-logo {
    width: 44px;
    height: auto;
    margin-top: 10px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  /* ══════════════════════════════════ TERUG ══════════════════════════════════ */
  .terug-wrap {
    padding: 1.25rem 2rem 0;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }
  .terug-link {
    font-size: 12px;
    color: var(--tekst-zacht);
    text-decoration: none;
    font-family: var(--fb);
    transition: color 0.15s ease;
  }
  .terug-link:hover { color: var(--jaar-kleur); }

  /* ══════════════════════════════════ CONTENT ══════════════════════════════════ */
  .content-wrap {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem 2rem 3rem;
  }

  /* ══════════════════════════════════ TEGELS ══════════════════════════════════ */
  .tegel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    align-items: stretch;
  }
  .tegel {
    background: var(--wit);
    border-radius: var(--radius);
    padding: 1.75rem 1.5rem 1.5rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: .75rem;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .tegel:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 22px rgba(0,0,0,.09);
  }
  .tegel-icoon {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: var(--achtergrond);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: .25rem;
  }
  .tegel-icoon svg {
    width: 28px;
    height: 28px;
    stroke: var(--jaar-kleur);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .tegel-naam {
    font-family: var(--ft);
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--jaar-kleur);
  }
  .tegel-omschrijving {
    font-family: var(--fb);
    font-size: .92rem;
    line-height: 1.45;
    color: var(--zwart);
    flex-grow: 1;
  }
  .tegel-pijl {
    font-size: 1.4rem;
    color: var(--accent);
    font-weight: 700;
    line-height: 1;
  }

  .voet {
    text-align: center;
    padding: 1rem;
    font-family: var(--fb);
    font-size: 12px;
    color: var(--tekst-zacht);
  }

  @media (max-width: 640px) {
    .hero-inhoud { padding: 3rem 1.25rem 2.5rem; }
    .hero h1 { font-size: 32px; }
    .terug-wrap, .content-wrap { padding-left: 1.25rem; padding-right: 1.25rem; }
    .tegel-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inhoud">
  <h1><span class="themas">Thema's</span></h1>    <p class="ondertitel">S.O. Groenhove campus Atheneum</p>
    <img class="school-logo" src="../images/nav/logo.svg" alt="Groenhove">
  </div>
</div>

<div class="terug-wrap">
  <a class="terug-link" href="index.html">&#8592; Terug naar 6de jaar</a>
</div>

<div class="content-wrap">
  <div class="tegel-grid">

    <a class="tegel" href="cultuur.html">
      <div class="tegel-icoon">
        <svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h12"/><circle cx="20" cy="17" r="2"/></svg>
      </div>
      <div class="tegel-naam">Cultuur</div>
      <div class="tegel-omschrijving">Cultuurdossiers per thema: Romeinse maatschappij, mythologie en geschiedenis.</div>
      <div class="tegel-pijl">›</div>
    </a>

    <a class="tegel" href="teksten.html">
      <div class="tegel-icoon">
        <svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M9 13h6M9 17h4"/></svg>
      </div>
      <div class="tegel-naam">Teksten</div>
      <div class="tegel-omschrijving">Latijnse leesteksten per thema, met vertaling, noten en woordenlijst.</div>
      <div class="tegel-pijl">›</div>
    </a>

  </div>
</div>

<p class="voet">J. Everaerdt &mdash; S.O. Groenhove campus Atheneum</p>
</body>
</html>
